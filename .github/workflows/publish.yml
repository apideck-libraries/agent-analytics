name: Publish

# Publishes @apideck/agent-analytics to npm whenever a GitHub Release is
# published (via the UI or `gh release create ...`). Can also be kicked off
# manually from the Actions tab if a publish needs retrying.
#
# AUTH — uses npm's OIDC trusted publishing (no secrets). Configure at
# https://www.npmjs.com/package/@apideck/agent-analytics/access → Trusted
# Publishers → this GitHub repo + workflow file name `publish.yml`. The
# `id-token: write` permission below is what makes the OIDC exchange work.
#
# Requirements it relies on:
#   - npm CLI >= 11.5.1 (installed explicitly below; Node 22 ships 10.x)
#   - No `registry-url` on setup-node — that plants an .npmrc referencing
#     NODE_AUTH_TOKEN and shortcuts past the OIDC path if the env var is
#     empty. Let npm use its default registry config instead.
#
# The version being published is whatever is in package.json at the release
# tag. Bump it manually (or via `npm version patch|minor|major`) before
# cutting the release so the two stay in sync.

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # npm OIDC trusted publishing requires npm CLI >= 11.5.1. Node 22 ships
      # with npm 10.x, so upgrade explicitly before publish.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm publish --provenance --access public
